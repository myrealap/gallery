<!DOCTYPE html>
<html>
<head>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<meta charset="utf-8">
<title>Myrealap - Official Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000000;
    font-family: 'ChaletRegular', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
  }

  .loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1s ease;
    flex-direction: column;
  }

  .quote-container {
    position: relative;
    text-align: center;
    padding: 40px;
    max-width: 80%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .quote-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 920px;
    height: 220px;
    background-image: url('images/quote-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .quote-text {
    position: relative;
    color: white;
    font-size: 20px;
    letter-spacing: 2px;
    font-family: 'ChaletRegular', Arial, sans-serif;
    line-height: 1.6;
    font-style: italic;
    z-index: 1;
  }

  .quote-author {
    position: relative;
    color: #888;
    font-size: 12px;
    margin-top: 20px;
    letter-spacing: 1px;
    z-index: 1;
  }

  .loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }

  .music-bar {
    height: 34px;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    flex-shrink: 0;
    position: relative;
  }

  .song-bg {
    position: absolute;
    top: 79%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    background-image: url('images/song-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  .prev-btn, .next-btn {
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    padding: 5px 10px;
    font-weight: bold;
    z-index: 1;
    position: relative;
  }

  .prev-btn:focus, .next-btn:focus {
    outline: none;
  }

  .prev-btn:hover, .next-btn:hover {
    color: #9E9E9E;
  }

  .song-info {
    text-align: center;
    flex-grow: 1;
    position: relative;
    z-index: 1;
  }

  .song-name-middle {
    color: white;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .singer-name {
    color: #888;
    font-size: 9px;
    margin-top: 2px;
  }

  .gallery-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    background: #000;
  }

  .gallery-container::-webkit-scrollbar {
    width: 0;
    background: transparent;
  }

  .scroll-row {
    width: 100%;
    overflow-x: hidden;
    white-space: nowrap;
    margin: 0;
    padding: 0;
    background: #000;
    line-height: 0;
  }

  .scroll-track {
    display: inline-block;
    white-space: nowrap;
  }

  .image-item {
    display: inline-block;
    margin: 0;
    padding: 0;
    line-height: 0;
    position: relative;
    cursor: pointer;
  }

  .image-item img {
    width: 180px;
    height: 240px;
    object-fit: cover;
    display: block;
    margin: 0;
    padding: 0;
    border: none;
  }

  .hover-png {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/hover-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    z-index: 2;
  }

  .image-item:hover .hover-png {
    opacity: 1;
  }

  .image-item.active .hover-png {
    opacity: 1;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .modal {
    background: #ffffffa3;
    border-radius: 0px;
    width: 900px;
    height: 500px;
    top: -80px;
    max-width: 85vw;
    display: flex;
    position: relative;
    overflow: hidden;
    transform: scale(0.9);
    transition: transform 0.3s ease;
    border: 0px solid #333;
  }

  /* MODAL BACKGROUND PNG */
  .modal::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/modal-bg.png');
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.2;
    pointer-events: none;
    z-index: 0;
  }

  .modal-overlay.active .modal {
    transform: scale(1);
  }

  .modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    background: none;
    border: none;
    color: white;
    font-size: 20px;
    cursor: pointer;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
    transition: 0.2s;
  }

  .modal-close:hover {
    background: none;
    transform: scale(1.05);
  }

  .modal-image {
    width: 100;
    height: 100%;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
  }

  .modal-description {
    flex: 1;
    padding: 20px;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .modal-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff3366;
  }

  .modal-text {
    font-size: 13px;
    line-height: 1.5;
    color: #ccc;
  }

  .modal-overlay {
    pointer-events: none;
  }

  .modal-overlay.active {
    pointer-events: auto;
  }

  .love-row {
    width: 100%;
    overflow-x: hidden;
    white-space: nowrap;
    background: #000;
    padding: 4px 0;
    margin: 0;
    line-height: 1;
  }

  .love-track {
    display: inline-block;
    white-space: nowrap;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 6px;
    color: #ffffff;
  }

  .love-track span {
    display: inline-block;
    padding: 0 10px;
  }

  .footer {
    text-align: center;
    padding: 8px;
    color: #666;
    font-size: 11px;
    background: #000;
    flex-shrink: 0;
  }

  @media (max-width: 600px) {
    .modal {
      flex-direction: column;
      width: 300px;
      height: auto;
    }
    .modal-image {
      width: 100%;
      height: 200px;
    }
    .modal-description {
      padding: 15px;
    }
  }

  @media (max-width: 1200px) and (max-height: 900px) {
    .image-item img { width: 160px; height: 213px; }
    .love-track { font-size: 26px; letter-spacing: 5px; }
    .love-track span { padding: 0 8px; }
  }

  @media (max-width: 1024px) and (max-height: 1366px) {
    .image-item img { width: 140px; height: 187px; }
    .love-track { font-size: 24px; letter-spacing: 4px; }
    .love-track span { padding: 0 8px; }
    .quote-text { font-size: 18px; }
    .quote-bg { width: 90px; height: 90px; }
    .song-bg { width: 140px; height: 140px; top: 75%; }
  }

  @media (max-width: 768px) and (max-height: 1024px) {
    .image-item img { width: 120px; height: 160px; }
    .love-track { font-size: 22px; letter-spacing: 4px; }
    .love-track span { padding: 0 6px; }
    .quote-text { font-size: 16px; }
    .quote-bg { width: 80px; height: 80px; }
    .song-bg { width: 100px; height: 100px; top: 72%; }
    .music-bar { height: 32px; }
    .song-name-middle { font-size: 12px; }
    .singer-name { font-size: 8px; }
  }

  @media (max-width: 480px) and (max-height: 900px) {
    .image-item img { width: 100px; height: 133px; }
    .love-track { font-size: 18px; letter-spacing: 3px; }
    .love-track span { padding: 0 5px; }
    .quote-text { font-size: 14px; }
    .quote-author { font-size: 10px; }
    .quote-bg { width: 65px; height: 65px; }
    .song-bg { width: 70px; height: 70px; top: 70%; }
    .music-bar { height: 30px; }
    .prev-btn, .next-btn { font-size: 14px; padding: 5px 8px; }
    .song-name-middle { font-size: 11px; }
    .singer-name { font-size: 7px; }
    .footer { font-size: 9px; padding: 6px; }
  }

  @media (max-width: 380px) and (max-height: 700px) {
    .image-item img { width: 85px; height: 113px; }
    .love-track { font-size: 16px; letter-spacing: 2px; }
    .love-track span { padding: 0 4px; }
    .quote-text { font-size: 12px; }
    .quote-bg { width: 55px; height: 55px; }
    .song-bg { width: 55px; height: 55px; top: 68%; }
  }

  @media (max-height: 700px) and (min-width: 800px) {
    .image-item img { width: 130px; height: 173px; }
    .love-track { font-size: 22px; letter-spacing: 4px; }
    .love-track span { padding: 0 6px; }
  }

  @media (max-height: 600px) {
    .image-item img { width: 110px; height: 147px; }
    .love-track { font-size: 20px; letter-spacing: 3px; }
    .love-track span { padding: 0 5px; }
    .quote-text { font-size: 14px; }
    .quote-bg { width: 60px; height: 60px; }
    .song-bg { width: 60px; height: 60px; top: 65%; }
  }

  @media (max-height: 500px) {
    .image-item img { width: 95px; height: 127px; }
    .love-track { font-size: 18px; letter-spacing: 3px; }
    .love-track span { padding: 0 4px; }
    .footer { padding: 4px; font-size: 8px; }
    .song-bg { width: 50px; height: 50px; top: 60%; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .image-item img { width: 100px; height: 133px; }
    .love-track { font-size: 18px; letter-spacing: 3px; }
    .love-track span { padding: 0 5px; }
    .quote-text { font-size: 13px; }
    .quote-bg { width: 55px; height: 55px; }
    .song-bg { width: 50px; height: 50px; top: 60%; }
    .music-bar { height: 30px; }
  }
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
  <div class="quote-container">
    <div class="quote-bg"></div>
    <div class="quote-text" id="quoteText">" loading... "</div>
    <div class="quote-author" id="quoteAuthor">— myrealap</div>
  </div>
</div>

<div class="music-bar">
  <div class="song-bg"></div>
  <button class="prev-btn" id="prevBtn">◄</button>
  <div class="song-info">
    <div class="song-name-middle" id="songNameDisplay">Loading...</div>
    <div class="singer-name" id="singerNameDisplay">Myrealap</div>
  </div>
  <button class="next-btn" id="nextBtn">►</button>
</div>

<div class="gallery-container" id="galleryContainer"></div>

<div class="footer">
  <span>© 2026 Myrealap. All Rights Reserved.</span>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <img class="modal-image" id="modalImage" src="" alt="">
    <div class="modal-description">
      <div class="modal-title" id="modalTitle">Image Title</div>
      <div class="modal-text" id="modalText">Description here.</div>
    </div>
  </div>
</div>

<script>
  const quotes = [
    { text: "Love & Imagination can change the world!", author: "Myrealap" },
    { text: "What makes you different, Makes you special", author: "Myrealap" },
    { text: "Your braver than you think", author: "Myrealap" },
    { text: "Music is the poetry of the air", author: "Richter" },
    { text: "Where words fail, music speaks", author: "Hans Christian Andersen" },
    { text: "Art washes away from the soul the dust of everyday life", author: "Picasso" },
    { text: "The only truth is music", author: "Kerouac" },
    { text: "Life is like a beautiful melody, only the lyrics are messed up", author: "Unknown" }
  ];
  
  function showRandomQuote() {
    const randomIndex = Math.floor(Math.random() * quotes.length);
    const quote = quotes[randomIndex];
    document.getElementById('quoteText').textContent = `" ${quote.text} "`;
    document.getElementById('quoteAuthor').textContent = `— ${quote.author}`;
  }
  
  showRandomQuote();
  
  const imageList = ["images/1.jpg", "images/2.jpg", "images/3.jpg", "images/4.jpg", "images/5.jpg", "images/6.jpg", "images/7.jpg", "images/8.jpg", "images/9.jpg"];
  
  const imageDescriptions = {
    "images/1.jpg": { title: "Midnight Dreams", desc: "A journey through the night sky, where stars tell stories of love and mystery." },
    "images/2.jpg": { title: "Echoes of Silence", desc: "In the quiet moments, we find our truest selves." },
    "images/3.jpg": { title: "Golden Horizon", desc: "Where the sun meets the sea, hope is born anew each day." },
    "images/4.jpg": { title: "Urban Lights", desc: "City nights shine bright with endless possibilities." },
    "images/5.jpg": { title: "Nature's Heart", desc: "Deep in the forest, magic whispers through the trees." },
    "images/6.jpg": { title: "Ocean Soul", desc: "Waves carry secrets from distant shores." },
    "images/7.jpg": { title: "Starry Night", desc: "Every star is a wish waiting to come true." },
    "images/8.jpg": { title: "Mountain Spirit", desc: "Stand tall like the mountains, strong and free." },
    "images/9.jpg": { title: "Garden of Eden", desc: "Beauty blooms where love grows." }
  };
  
  const playlist = [
    { name: "Dooset Daram", singer: "shohreh" },
    { name: "Havas", singer: "shohreh" },
    { name: "Kafi Nbood Barat", singer: "shohreh" },
    { name: "Bargard", singer: "shohreh" },
    { name: "Esrar", singer: "shohreh" },
    { name: "Fereshteha", singer: "shohreh" },
    { name: "Pashimoonam", singer: "shohreh" }
  ];
  
  const songFiles = [
    "songs/song1.mp3",
    "songs/song2.mp3",
    "songs/song3.mp3",
    "songs/song4.mp3",
    "songs/song5.mp3",
    "songs/song6.mp3",
    "songs/song7.mp3"
  ];
  
  class InfiniteScroller {
    constructor(container, track, direction, speed = 0.7, startOffset = 0) {
      this.container = container;
      this.track = track;
      this.direction = direction;
      this.speed = speed;
      this.position = startOffset;
      this.animationId = null;
      this.isRunning = true;
      this.trackWidth = 0;
    }
    
    init() {
      this.calcWidth();
      this.makeEndless();
      this.calcWidth();
      this.applyTransform();
      this.start();
      window.addEventListener('resize', () => this.resize());
    }
    
    calcWidth() {
      this.trackWidth = this.track.scrollWidth;
    }
    
    makeEndless() {
      const target = window.innerWidth * 8;
      let safety = 0;
      while (this.track.scrollWidth < target && safety < 15) {
        const children = Array.from(this.track.children);
        for (let i = 0; i < children.length; i++) {
          this.track.appendChild(children[i].cloneNode(true));
        }
        safety++;
      }
    }
    
    resize() {
      this.calcWidth();
      this.applyTransform();
    }
    
    applyTransform() {
      this.track.style.transform = `translateX(${this.position}px)`;
    }
    
    start() {
      const step = () => {
        if (!this.isRunning) return;
        
        if (this.direction === 'left') {
          this.position -= this.speed;
        } else {
          this.position += this.speed;
        }
        
        if (Math.abs(this.position) >= this.trackWidth / 2) {
          if (this.direction === 'left') {
            this.position += this.trackWidth / 2;
          } else {
            this.position -= this.trackWidth / 2;
          }
        }
        
        this.track.style.transform = `translateX(${this.position}px)`;
        this.animationId = requestAnimationFrame(step);
      };
      
      this.animationId = requestAnimationFrame(step);
    }
    
    stop() {
      this.isRunning = false;
      if (this.animationId) cancelAnimationFrame(this.animationId);
    }
    
    resume() {
      if (!this.isRunning) {
        this.isRunning = true;
        this.start();
      }
    }
  }
  
  function createImageElement(imgSrc) {
    const imgItem = document.createElement('div');
    imgItem.className = 'image-item';
    
    const img = document.createElement('img');
    img.src = imgSrc;
    img.alt = '';
    img.loading = 'lazy';
    img.onerror = function() {
      this.style.backgroundColor = '#222';
      this.style.width = '180px';
      this.style.height = '240px';
    };
    
    const hoverDiv = document.createElement('div');
    hoverDiv.className = 'hover-png';
    
    imgItem.appendChild(img);
    imgItem.appendChild(hoverDiv);
    
    imgItem.addEventListener('click', (function(src, element) {
      return function() {
        document.querySelectorAll('.image-item.active').forEach(item => {
          item.classList.remove('active');
        });
        element.classList.add('active');
        openModal(src);
      };
    })(imgSrc, imgItem));
    
    return imgItem;
  }
  
  function buildImageRow(direction) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'scroll-row';
    const trackDiv = document.createElement('div');
    trackDiv.className = 'scroll-track';
    
    let sequence = [];
    
    if (direction === 'right') {
      for (let i = imageList.length - 1; i >= 0; i--) {
        sequence.push(imageList[i]);
      }
    } else {
      sequence = [...imageList];
    }
    
    const TOTAL_REPEATS = 200;
    for (let r = 0; r < TOTAL_REPEATS; r++) {
      for (let i = 0; i < sequence.length; i++) {
        const imgItem = createImageElement(sequence[i]);
        trackDiv.appendChild(imgItem);
      }
    }
    
    rowDiv.appendChild(trackDiv);
    return rowDiv;
  }
  
  function buildLoveRow(direction) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'love-row';
    const trackDiv = document.createElement('div');
    trackDiv.className = 'love-track';
    
    const TOTAL_LOVE = 30000;
    for (let i = 0; i < TOTAL_LOVE; i++) {
      const span = document.createElement('span');
      span.textContent = 'Love';
      trackDiv.appendChild(span);
    }
    
    rowDiv.appendChild(trackDiv);
    return rowDiv;
  }
  
  function openModal(imageSrc) {
    const modalOverlay = document.getElementById('modalOverlay');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    
    modalImage.src = imageSrc;
    
    const desc = imageDescriptions[imageSrc] || { 
      title: "Beautiful Moment", 
      desc: "A special memory captured in time." 
    };
    
    modalTitle.textContent = desc.title;
    modalText.textContent = desc.desc;
    
    modalOverlay.classList.add('active');
  }
  
  function closeModal() {
    const modalOverlay = document.getElementById('modalOverlay');
    modalOverlay.classList.remove('active');
    document.querySelectorAll('.image-item.active').forEach(item => {
      item.classList.remove('active');
    });
  }
  
  function createGallery() {
    const container = document.getElementById('galleryContainer');
    container.innerHTML = '';
    const scrollers = [];
    
    const rightOffset = -8000;
    const loveRightOffset = -4000;
    
    const row1 = buildImageRow('right');
    container.appendChild(row1);
    const s1 = new InfiniteScroller(row1, row1.querySelector('.scroll-track'), 'right', 0.5, rightOffset);
    s1.init();
    scrollers.push(s1);
    
    const row2 = buildImageRow('left');
    container.appendChild(row2);
    const s2 = new InfiniteScroller(row2, row2.querySelector('.scroll-track'), 'left', 0.7, 0);
    s2.init();
    scrollers.push(s2);
    
    const row3 = buildImageRow('right');
    container.appendChild(row3);
    const s3 = new InfiniteScroller(row3, row3.querySelector('.scroll-track'), 'right', 0.4, rightOffset);
    s3.init();
    scrollers.push(s3);
    
    const love1 = buildLoveRow('right');
    container.appendChild(love1);
    const l1 = new InfiniteScroller(love1, love1.querySelector('.love-track'), 'right', 0.6, loveRightOffset);
    l1.init();
    scrollers.push(l1);
    
    const love2 = buildLoveRow('left');
    container.appendChild(love2);
    const l2 = new InfiniteScroller(love2, love2.querySelector('.love-track'), 'left', 0.55, 0);
    l2.init();
    scrollers.push(l2);
    
    return scrollers;
  }
  
  function preloadImages(images, callback) {
    let loaded = 0;
    const total = images.length;
    
    if (total === 0) {
      callback();
      return;
    }
    
    images.forEach((src) => {
      const img = new Image();
      img.onload = () => {
        loaded++;
        if (loaded === total) callback();
      };
      img.onerror = () => {
        loaded++;
        if (loaded === total) callback();
      };
      img.src = src;
    });
  }
  
  let currentTrack = 0;
  let audio = new Audio();
  audio.volume = 0.7;
  
  function loadTrack(index) {
    if (songFiles[index]) {
      audio.src = songFiles[index];
    }
    document.getElementById('songNameDisplay').textContent = playlist[index].name;
    document.getElementById('singerNameDisplay').textContent = playlist[index].singer;
  }
  
  function playMusic() {
    if (audio.src) {
      audio.play().catch(() => {});
    }
  }
  
  function forcePlayMusic() {
    if (audio.src) {
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          const tryPlay = () => {
            audio.play();
            document.removeEventListener('click', tryPlay);
            document.removeEventListener('touchstart', tryPlay);
          };
          document.addEventListener('click', tryPlay);
          document.addEventListener('touchstart', tryPlay);
        });
      }
    }
  }
  
  function nextTrack() {
    currentTrack = (currentTrack + 1) % playlist.length;
    loadTrack(currentTrack);
    forcePlayMusic();
  }
  
  function prevTrack() {
    currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
    loadTrack(currentTrack);
    forcePlayMusic();
  }
  
  audio.addEventListener('ended', () => {
    nextTrack();
  });
  
  let allScrollers = [];
  
  window.addEventListener('DOMContentLoaded', () => {
    preloadImages(imageList, () => {
      allScrollers = createGallery();
      loadTrack(0);
      
      const loadingScreen = document.getElementById('loadingScreen');
      loadingScreen.classList.add('hide');
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        forcePlayMusic();
      }, 1000);
    });
    
    document.getElementById('prevBtn').onclick = prevTrack;
    document.getElementById('nextBtn').onclick = nextTrack;
    document.getElementById('modalClose').onclick = closeModal;
    document.getElementById('modalOverlay').onclick = (e) => {
      if (e.target === document.getElementById('modalOverlay')) {
        closeModal();
      }
    };
    
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        allScrollers.forEach(s => s.stop());
      } else {
        allScrollers.forEach(s => s.resume());
      }
    });
  });
</script>
</body>
</html>
