<!DOCTYPE html>
<html>
<head>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<meta charset="utf-8">
<title>Myrealap - Official Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #000000;
    font-family: 'ChaletRegular', Arial, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100%;
    display: flex;
    flex-direction: column;
    touch-action: pan-y pinch-zoom; /* Allow only vertical scroll, no horizontal */
  }

  /* FIX FOR MOBILE - Prevent horizontal scroll */
  .gallery-container {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden; /* CHANGED from visible to hidden - FIX for mobile */
    background: #000;
    touch-action: pan-y; /* Vertical scroll only */
  }

  .scroll-row {
    width: 100%;
    overflow-x: hidden; /* CHANGED from visible to hidden */
    overflow-y: visible;
    white-space: nowrap;
    margin: 0;
    padding: 0;
    background: #000;
    line-height: 0;
  }

  .scroll-track {
    display: inline-block;
    white-space: nowrap;
    overflow: visible;
  }

  /* Rest of your CSS stays the same */
  .loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000000;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1s ease;
    flex-direction: column;
  }

  .quote-container {
    position: relative;
    text-align: center;
    padding: 40px;
    max-width: 80%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .quote-bg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 920px;
    height: 220px;
    background-image: url('images/quote-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .quote-text {
    position: relative;
    color: white;
    font-size: 20px;
    letter-spacing: 2px;
    font-family: 'ChaletRegular', Arial, sans-serif;
    line-height: 1.6;
    font-style: italic;
    z-index: 1;
  }

  .quote-author {
    position: relative;
    color: #888;
    font-size: 12px;
    margin-top: 20px;
    letter-spacing: 1px;
    z-index: 1;
  }

  .loading-screen.hide {
    opacity: 0;
    pointer-events: none;
  }

  .music-bar {
    height: 34px;
    background: #111;
    border-bottom: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    flex-shrink: 0;
    position: relative;
  }

  .song-bg {
    position: absolute;
    top: 79%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 180px;
    height: 180px;
    background-image: url('images/song-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0.25;
    pointer-events: none;
    z-index: 10;
  }

  .music-bg-sparkle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 34px;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
  }

  .music-bg-sparkle {
    position: absolute;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    animation: bgSparkleFade 3s ease-in-out infinite;
    pointer-events: none;
  }

  @keyframes bgSparkleFade {
    0% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    25% { opacity: 0.5; transform: scale(1) rotate(90deg); }
    50% { opacity: 0.3; transform: scale(0.8) rotate(180deg); }
    75% { opacity: 0.5; transform: scale(1) rotate(270deg); }
    100% { opacity: 0; transform: scale(0.5) rotate(360deg); }
  }

  .prev-btn, .next-btn {
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    padding: 5px 10px;
    font-weight: bold;
    z-index: 15;
    position: relative;
    transition: color 0.2s ease;
  }

  .prev-btn:hover, .next-btn:hover {
    color: #9e9e9e;
  }

  .prev-btn:focus, .next-btn:focus {
    outline: none;
  }

  .hover-prev-text, .hover-next-text {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: #ffffff;
    font-size: 11px;
    letter-spacing: 1px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease;
    pointer-events: none;
    z-index: 20;
  }

  .hover-prev-text {
    left: 40px;
  }

  .hover-next-text {
    right: 40px;
  }

  .prev-btn:hover ~ .hover-prev-text,
  .prev-btn:hover + .hover-prev-text {
    opacity: 1;
    visibility: visible;
  }

  .next-btn:hover ~ .hover-next-text,
  .next-btn:hover + .hover-next-text {
    opacity: 1;
    visibility: visible;
  }

  .music-bar {
    position: relative;
  }

  .song-info {
    text-align: center;
    flex-grow: 1;
    position: relative;
    z-index: 15;
  }

  .song-name-middle {
    color: white;
    font-size: 13px;
    letter-spacing: 1px;
  }

  .singer-name {
    color: #888;
    font-size: 9px;
    margin-top: 2px;
  }

  .music-sparkle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9998;
    overflow: hidden;
  }

  .music-sparkle {
    position: absolute;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    animation: musicSparkleFade 1s ease-out forwards;
    pointer-events: none;
  }

  @keyframes musicSparkleFade {
    0% {
      opacity: 0;
      transform: scale(0.3) rotate(0deg);
    }
    20% {
      opacity: 1;
      transform: scale(1) rotate(180deg);
    }
    80% {
      opacity: 0.8;
      transform: scale(0.8) rotate(360deg);
    }
    100% {
      opacity: 0;
      transform: scale(0.2) rotate(540deg);
    }
  }

  /* TOUCH SPARKLE CONTAINER - for mobile */
  .touch-sparkle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 99999998;
    overflow: hidden;
  }

  .touch-sparkle {
    position: absolute;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    animation: touchSparkleFade 0.6s ease-out forwards;
    pointer-events: none;
  }

  @keyframes touchSparkleFade {
    0% {
      opacity: 0;
      transform: scale(0.2) rotate(0deg);
    }
    30% {
      opacity: 1;
      transform: scale(1) rotate(180deg);
    }
    70% {
      opacity: 0.6;
      transform: scale(0.7) rotate(360deg);
    }
    100% {
      opacity: 0;
      transform: scale(0.1) rotate(540deg);
    }
  }

  /* MOUSE TRAIL (only for desktop, will be disabled on touch) */
  .mouse-trail-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 99999997;
    overflow: hidden;
  }

  .mouse-sparkle {
    position: absolute;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    animation: mouseSparkleFade 0.8s ease-out forwards;
    pointer-events: none;
  }

  @keyframes mouseSparkleFade {
    0% {
      opacity: 0;
      transform: scale(0.2) rotate(0deg);
    }
    30% {
      opacity: 1;
      transform: scale(1) rotate(180deg);
    }
    70% {
      opacity: 0.6;
      transform: scale(0.7) rotate(360deg);
    }
    100% {
      opacity: 0;
      transform: scale(0.1) rotate(540deg);
    }
  }

  .gallery-container::-webkit-scrollbar {
    width: 0;
    background: transparent;
  }

  .image-item {
    display: inline-block;
    margin: 0;
    padding: 0;
    line-height: 0;
    position: relative;
    cursor: pointer;
    overflow: visible;
  }

  .image-item:hover {
    z-index: 9999;
  }

  .image-item img {
    width: 180px;
    height: 240px;
    object-fit: cover;
    display: block;
    margin: 0;
    padding: 0;
    border: none;
  }

  .hover-png {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 260px;
    height: 260px;
    background-image: url('images/hover-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
    z-index: 10000;
  }

  .image-item:hover .hover-png {
    opacity: 1;
  }

  .image-item.active .hover-png {
    opacity: 1;
  }

  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  /* MODAL - FIXED FOR MOBILE */
  .modal {
    position: relative;
    width: 800px;
    max-width: 85vw;
    display: flex;
    transform: scale(0.9);
    transition: transform 0.3s ease;
    overflow: visible;
    background: transparent;
  }

  /* MODAL BG - FIXED POSITION FOR MOBILE */
  .modal-bg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90vw;
    height: 90vh;
    background-image: url('images/modal-bg.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    z-index: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .modal-overlay.active .modal-bg {
    opacity: 1;
  }

  .modal-content {
    position: relative;
    width: 100%;
    background: transparent;
    display: flex;
    z-index: 10002;
  }

  .modal-close {
    position: absolute;
    top: 15px;
    right: 20px;
    width: 30px;
    height: 30px;
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10003;
  }

  .modal-close:focus {
    outline: none;
  }

  .modal-image {
    width: 40%;
    object-fit: cover;
    display: block;
    margin: 30px 0 30px 30px;
    border-radius: 0px;
  }

  .modal-description {
    flex: 1;
    padding: 30px 30px 30px 20px;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
    z-index: 1;
  }

  .modal-title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 15px;
    color: #ffffff;
    text-align: center;
  }

  .modal-text {
    font-size: 14px;
    line-height: 1.6;
    color: #ffffff;
    text-align: center;
  }

  .sparkle-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
    overflow: hidden;
  }

  .sparkle {
    position: absolute;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    opacity: 0;
    animation: sparkleFade 2s ease-out forwards;
    pointer-events: none;
  }

  @keyframes sparkleFade {
    0% {
      opacity: 0;
      transform: scale(0.3) rotate(0deg);
    }
    15% {
      opacity: 1;
      transform: scale(1.2) rotate(180deg);
    }
    85% {
      opacity: 0.8;
      transform: scale(1) rotate(360deg);
    }
    100% {
      opacity: 0;
      transform: scale(0.2) rotate(540deg);
    }
  }

  .modal-overlay {
    pointer-events: none;
  }

  .modal-overlay.active {
    pointer-events: auto;
  }

  .love-row {
    width: 100%;
    overflow-x: hidden;
    white-space: nowrap;
    background: #000;
    padding: 4px 0;
    margin: 0;
    line-height: 1;
  }

  .love-track {
    display: inline-block;
    white-space: nowrap;
    font-size: 28px;
    font-weight: bold;
    letter-spacing: 6px;
    color: #ffffff;
  }

  .love-track span {
    display: inline-block;
    padding: 0 10px;
  }

  .footer {
    text-align: center;
    padding: 8px;
    color: #666;
    font-size: 11px;
    background: #000;
    flex-shrink: 0;
  }

  /* MOBILE SPECIFIC FIXES */
  @media (max-width: 768px) {
    .modal-content {
      flex-direction: column;
    }
    .modal-image {
      width: 60%;
      margin: 30px auto 0 auto;
    }
    .modal-description {
      padding: 20px;
    }
    .modal-title {
      font-size: 18px;
    }
    .modal-text {
      font-size: 12px;
    }
    .modal-bg {
      width: 95vw;
      height: 95vh;
      top: 50%;
      left: 50%;
    }
    .hover-prev-text, .hover-next-text {
      font-size: 8px;
    }
    .hover-prev-text {
      left: 35px;
    }
    .hover-next-text {
      right: 35px;
    }
    .hover-png {
      width: 200px;
      height: 200px;
    }
    .image-item img {
      width: 140px;
      height: 187px;
    }
    .love-track {
      font-size: 22px;
      letter-spacing: 4px;
    }
  }

  @media (max-width: 480px) and (max-height: 900px) {
    .hover-png {
      width: 160px;
      height: 160px;
    }
    .image-item img {
      width: 100px;
      height: 133px;
    }
    .love-track {
      font-size: 18px;
    }
  }

  /* ANIMATED CURSOR - only visible on desktop (mouse) */
  .custom-cursor {
    position: fixed;
    width: 40px;
    height: 40px;
    pointer-events: none;
    z-index: 99999999;
    transform: translate(-50%, -50%);
    transition: transform 0.05s ease;
  }

  .custom-cursor::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: url('images/sparkle.png');
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    animation: cursorSpin 1.5s linear infinite, cursorGlow 1.5s ease-in-out infinite;
  }

  @keyframes cursorSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes cursorGlow {
    0% { 
      opacity: 0.7;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));
    }
    50% { 
      opacity: 1;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)) drop-shadow(0 0 4px #ff3366);
    }
    100% { 
      opacity: 0.7;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));
    }
  }

  /* Hide default cursor only on devices that support hover (desktop) */
  @media (hover: hover) and (pointer: fine) {
    * {
      cursor: none;
    }
  }

  /* Keep your sparkle-c cursor as fallback */
  @media (hover: hover) and (pointer: fine) {
    * {
      cursor: url('images/sparkle-c.png') 0 0, url('images/sparkle-c.cur'), none;
    }
  }
</style>

      this.calcWidth();
      this.applyTransform();
      this.start();
      window.addEventListener('resize', () => this.resize());
    }
    
    calcWidth() {
      this.trackWidth = this.track.scrollWidth;
    }
    
    makeEndless() {
      const target = window.innerWidth * 8;
      let safety = 0;
      while (this.track.scrollWidth < target && safety < 15) {
        const children = Array.from(this.track.children);
        for (let i = 0; i < children.length; i++) {
          this.track.appendChild(children[i].cloneNode(true));
        }
        safety++;
      }
    }
    
    resize() {
      this.calcWidth();
      this.applyTransform();
    }
    
    applyTransform() {
      this.track.style.transform = `translateX(${this.position}px)`;
    }
    
    start() {
      const step = () => {
        if (!this.isRunning) return;
        
        if (this.direction === 'left') {
          this.position -= this.speed;
        } else {
          this.position += this.speed;
        }
        
        if (Math.abs(this.position) >= this.trackWidth / 2) {
          if (this.direction === 'left') {
            this.position += this.trackWidth / 2;
          } else {
            this.position -= this.trackWidth / 2;
          }
        }
        
        this.track.style.transform = `translateX(${this.position}px)`;
        this.animationId = requestAnimationFrame(step);
      };
      
      this.animationId = requestAnimationFrame(step);
    }
    
    stop() {
      this.isRunning = false;
      if (this.animationId) cancelAnimationFrame(this.animationId);
    }
    
    resume() {
      if (!this.isRunning) {
        this.isRunning = true;
        this.start();
      }
    }
  }
  
  function createImageElement(imgSrc) {
    const imgItem = document.createElement('div');
    imgItem.className = 'image-item';
    
    const img = document.createElement('img');
    img.src = imgSrc;
    img.alt = '';
    img.loading = 'lazy';
    img.onerror = function() {
      this.style.backgroundColor = '#222';
      this.style.width = '180px';
      this.style.height = '240px';
    };
    
    const hoverDiv = document.createElement('div');
    hoverDiv.className = 'hover-png';
    
    imgItem.appendChild(img);
    imgItem.appendChild(hoverDiv);
    
    imgItem.addEventListener('click', (function(src, element) {
      return function() {
        document.querySelectorAll('.image-item.active').forEach(item => {
          item.classList.remove('active');
        });
        element.classList.add('active');
        
        clickSound.currentTime = 0;
        clickSound.play().catch(() => {});
        
        openModal(src);
      };
    })(imgSrc, imgItem));
    
    return imgItem;
  }
  
  function buildImageRowCustom(customSequence) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'scroll-row';
    const trackDiv = document.createElement('div');
    trackDiv.className = 'scroll-track';
    
    const TOTAL_REPEATS = 200;
    for (let r = 0; r < TOTAL_REPEATS; r++) {
      for (let i = 0; i < customSequence.length; i++) {
        const imgItem = createImageElement(customSequence[i]);
        trackDiv.appendChild(imgItem);
      }
    }
    
    rowDiv.appendChild(trackDiv);
    return rowDiv;
  }
  
  function buildLoveRow(direction) {
    const rowDiv = document.createElement('div');
    rowDiv.className = 'love-row';
    const trackDiv = document.createElement('div');
    trackDiv.className = 'love-track';
    
    const TOTAL_LOVE = 50000;
    for (let i = 0; i < TOTAL_LOVE; i++) {
      const span = document.createElement('span');
      span.textContent = 'Love';
      trackDiv.appendChild(span);
    }
    
    rowDiv.appendChild(trackDiv);
    return rowDiv;
  }
  
  let sparkleInterval = null;
  let isModalOpen = false;
  let bgSparkleInterval = null;
  
  function createBackgroundSparkles() {
    if (bgSparkleInterval) clearInterval(bgSparkleInterval);
    const container = document.getElementById('musicBgSparkleContainer');
    
    function addBgSparkle() {
      const sparkle = document.createElement('div');
      sparkle.className = 'music-bg-sparkle';
      sparkle.style.left = Math.random() * 100 + '%';
      sparkle.style.top = Math.random() * 100 + '%';
      sparkle.style.animationDelay = Math.random() * 2 + 's';
      const size = Math.random() * 19 + 13;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      container.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 3000);
    }
    
    for (let i = 0; i < BG_SPARKLE_COUNT; i++) setTimeout(() => addBgSparkle(), i * 100);
    bgSparkleInterval = setInterval(addBgSparkle, BG_SPARKLE_INTERVAL);
  }
  
  let musicSparkleInterval = null;
  let isHoveringButton = false;
  
  function createMusicSparkles(targetElement) {
    if (musicSparkleInterval) clearInterval(musicSparkleInterval);
    const container = document.getElementById('musicSparkleContainer');
    
    function addMusicSparkle() {
      if (!isHoveringButton) return;
      const rect = targetElement.getBoundingClientRect();
      const sparkle = document.createElement('div');
      sparkle.className = 'music-sparkle';
      const offsetX = (Math.random() - 0.5) * HOVER_SPARKLE_RADIUS;
      const offsetY = (Math.random() - 0.5) * 90;
      sparkle.style.left = (rect.left + rect.width / 2 + offsetX) + 'px';
      sparkle.style.top = (rect.top + rect.height / 2 + offsetY) + 'px';
      const size = Math.random() * 20 + 10;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      container.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 1000);
    }
    
    musicSparkleInterval = setInterval(() => { if (isHoveringButton) addMusicSparkle(); }, HOVER_SPARKLE_SPEED);
  }
  
  function stopMusicSparkles() {
    if (musicSparkleInterval) clearInterval(musicSparkleInterval);
    document.getElementById('musicSparkleContainer').innerHTML = '';
  }
  
  // ============================================
  // MOUSE TRAIL (desktop only)
  // ============================================
  let lastMouseX = window.innerWidth / 2;
  let lastMouseY = window.innerHeight / 2;
  let continuousSparkleInterval = null;
  
  function addMouseSparkle(x, y) {
    const container = document.getElementById('mouseTrailContainer');
    const sparkle = document.createElement('div');
    sparkle.className = 'mouse-sparkle';
    const offsetX = (Math.random() - 0.5) * 20;
    const offsetY = (Math.random() - 0.5) * 20;
    sparkle.style.left = (x + offsetX) + 'px';
    sparkle.style.top = (y + offsetY) + 'px';
    sparkle.style.animationDelay = Math.random() * 0.1 + 's';
    const size = Math.random() * (MOUSE_SPARKLE_SIZE_MAX - MOUSE_SPARKLE_SIZE_MIN) + MOUSE_SPARKLE_SIZE_MIN;
    sparkle.style.width = size + 'px';
    sparkle.style.height = size + 'px';
    container.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 800);
  }
  
  function startMouseTrail() {
    if (isTouchDevice) return;
    let lastTime = 0;
    document.addEventListener('mousemove', (e) => {
      const now = Date.now();
      if (now - lastTime > MOUSE_SPARKLE_INTERVAL) {
        lastTime = now;
        addMouseSparkle(e.clientX, e.clientY);
      }
      lastMouseX = e.clientX;
      lastMouseY = e.clientY;
    });
    continuousSparkleInterval = setInterval(() => addMouseSparkle(lastMouseX, lastMouseY), MOUSE_SPARKLE_INTERVAL);
  }
  
  // ============================================
  // TOUCH SPARKLES (for mobile)
  // ============================================
  function addTouchSparkle(x, y) {
    const container = document.getElementById('touchSparkleContainer');
    const sparkle = document.createElement('div');
    sparkle.className = 'touch-sparkle';
    const offsetX = (Math.random() - 0.5) * 30;
    const offsetY = (Math.random() - 0.5) * 30;
    sparkle.style.left = (x + offsetX) + 'px';
    sparkle.style.top = (y + offsetY) + 'px';
    const size = Math.random() * 25 + 15;
    sparkle.style.width = size + 'px';
    sparkle.style.height = size + 'px';
    container.appendChild(sparkle);
    setTimeout(() => sparkle.remove(), 600);
  }
  
  function startTouchSparkles() {
    if (!isTouchDevice) return;
    
    document.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      addTouchSparkle(touch.clientX, touch.clientY);
    });
    
    document.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      for (let i = 0; i < 3; i++) {
        setTimeout(() => addTouchSparkle(touch.clientX, touch.clientY), i * 50);
      }
    });
  }
  
  function createSparkles() {
    if (sparkleInterval) clearInterval(sparkleInterval);
    const container = document.getElementById('sparkleContainer');
    container.innerHTML = '';
    
    function addSparkle() {
      if (!isModalOpen) return;
      const sparkle = document.createElement('div');
      sparkle.className = 'sparkle';
      sparkle.style.left = Math.random() * window.innerWidth + 'px';
      sparkle.style.top = Math.random() * window.innerHeight + 'px';
      sparkle.style.animationDelay = Math.random() * 0.5 + 's';
      const size = Math.random() * 50 + 20;
      sparkle.style.width = size + 'px';
      sparkle.style.height = size + 'px';
      container.appendChild(sparkle);
      setTimeout(() => sparkle.remove(), 2000);
    }
    
    for (let i = 0; i < MODAL_INITIAL_SPARKLES; i++) setTimeout(() => addSparkle(), i * 50);
    sparkleInterval = setInterval(() => { if (isModalOpen) addSparkle(); }, MODAL_CONTINUOUS_INTERVAL);
  }
  
  function stopSparkles() {
    if (sparkleInterval) clearInterval(sparkleInterval);
    document.getElementById('sparkleContainer').innerHTML = '';
  }
  
  function openModal(imageSrc) {
    const modalOverlay = document.getElementById('modalOverlay');
    const modalImage = document.getElementById('modalImage');
    const modalTitle = document.getElementById('modalTitle');
    const modalText = document.getElementById('modalText');
    
    modalImage.src = imageSrc;
    const desc = imageDescriptions[imageSrc] || { title: "Beautiful Moment", desc: "A special memory captured in time." };
    modalTitle.textContent = desc.title;
    modalText.textContent = desc.desc;
    
    isModalOpen = true;
    modalOverlay.classList.add('active');
    createSparkles();
  }
  
  function closeModal() {
    const modalOverlay = document.getElementById('modalOverlay');
    modalOverlay.classList.remove('active');
    isModalOpen = false;
    stopSparkles();
    document.querySelectorAll('.image-item.active').forEach(item => item.classList.remove('active'));
  }
  
  function createGallery() {
    const container = document.getElementById('galleryContainer');
    container.innerHTML = '';
    const scrollers = [];
    
    const rightOffset = -80000;
    const loveRightOffset = -40000;
    
    const customOrderRow1 = ["images/1.jpg", "images/3.jpg", "images/5.jpg", "images/7.jpg", "images/9.jpg", "images/11.jpg", "images/13.jpg"];
    const row1 = buildImageRowCustom(customOrderRow1);
    container.appendChild(row1);
    const s1 = new InfiniteScroller(row1, row1.querySelector('.scroll-track'), 'right', 0.8, rightOffset);
    s1.init();
    scrollers.push(s1);
    
    const customOrderRow2 = ["images/14.jpg", "images/13.jpg", "images/12.jpg", "images/11.jpg", "images/10.jpg", "images/9.jpg", "images/8.jpg", "images/7.jpg", "images/6.jpg", "images/5.jpg", "images/4.jpg", "images/3.jpg", "images/2.jpg", "images/1.jpg"];
    const row2 = buildImageRowCustom(customOrderRow2);
    container.appendChild(row2);
    const s2 = new InfiniteScroller(row2, row2.querySelector('.scroll-track'), 'left', 0.7, 0);
    s2.init();
    scrollers.push(s2);
    
    const customOrderRow3 = ["images/2.jpg", "images/4.jpg", "images/6.jpg", "images/8.jpg", "images/10.jpg", "images/12.jpg", "images/14.jpg"];
    const row3 = buildImageRowCustom(customOrderRow3);
    container.appendChild(row3);
    const s3 = new InfiniteScroller(row3, row3.querySelector('.scroll-track'), 'right', 0.6, rightOffset);
    s3.init();
    scrollers.push(s3);
    
    const love1 = buildLoveRow('right');
    container.appendChild(love1);
    const l1 = new InfiniteScroller(love1, love1.querySelector('.love-track'), 'right', 0.7, loveRightOffset);
    l1.init();
    scrollers.push(l1);
    
    const love2 = buildLoveRow('left');
    container.appendChild(love2);
    const l2 = new InfiniteScroller(love2, love2.querySelector('.love-track'), 'left', 0.7, 0);
    l2.init();
    scrollers.push(l2);
    
    return scrollers;
  }
  
  function preloadAllAssets(images, callback) {
    let loaded = 0;
    const assetsToLoad = [...images, "images/sparkle.png", "images/hover-bg.png", "images/quote-bg.png", "images/song-bg.png", "images/modal-bg.png"];
    const total = assetsToLoad.length;
    if (total === 0) { callback(); return; }
    assetsToLoad.forEach((src) => {
      const img = new Image();
      img.onload = () => { loaded++; if (loaded === total) callback(); };
      img.onerror = () => { loaded++; if (loaded === total) callback(); };
      img.src = src;
    });
  }
  
  let currentTrack = 0;
  let audio = new Audio();
  audio.volume = 0.7;
  
  function loadTrack(index) {
    if (songFiles[index]) audio.src = songFiles[index];
    document.getElementById('songNameDisplay').textContent = playlist[index].name;
    document.getElementById('singerNameDisplay').textContent = playlist[index].singer;
  }
  
  function playMusic() { if (audio.src) audio.play().catch(() => {}); }
  
  function forcePlayMusic() {
    if (audio.src) {
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          const tryPlay = () => {
            audio.play();
            document.removeEventListener('click', tryPlay);
            document.removeEventListener('touchstart', tryPlay);
          };
          document.addEventListener('click', tryPlay);
          document.addEventListener('touchstart', tryPlay);
        });
      }
    }
  }
  
  function nextTrack() {
    currentTrack = (currentTrack + 1) % playlist.length;
    loadTrack(currentTrack);
    forcePlayMusic();
  }
  
  function prevTrack() {
    currentTrack = (currentTrack - 1 + playlist.length) % playlist.length;
    loadTrack(currentTrack);
    forcePlayMusic();
  }
  
  audio.addEventListener('ended', () => nextTrack());
  
  let allScrollers = [];
  
  window.addEventListener('DOMContentLoaded', () => {
    preloadAllAssets(imageList, () => {
      allScrollers = createGallery();
      loadTrack(0);
      
      const loadingScreen = document.getElementById('loadingScreen');
      loadingScreen.classList.add('hide');
      
      setTimeout(() => {
        loadingScreen.style.display = 'none';
        forcePlayMusic();
        createBackgroundSparkles();
        
        // Start appropriate sparkle effect based on device
        if (isTouchDevice) {
          startTouchSparkles();
        } else {
          startMouseTrail();
        }
      }, 1000);
    });
    
    document.getElementById('prevBtn').onclick = prevTrack;
    document.getElementById('nextBtn').onclick = nextTrack;
    document.getElementById('modalClose').onclick = closeModal;
    document.getElementById('modalOverlay').onclick = (e) => { if (e.target === document.getElementById('modalOverlay')) closeModal(); };
    
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const hoverPrevText = document.getElementById('hoverPrevText');
    const hoverNextText = document.getElementById('hoverNextText');
    
    prevBtn.addEventListener('mouseenter', () => {
      if (isTouchDevice) return;
      isHoveringButton = true;
      hoverPrevText.style.opacity = '1';
      hoverPrevText.style.visibility = 'visible';
      createMusicSparkles(prevBtn);
    });
    
    prevBtn.addEventListener('mouseleave', () => {
      if (isTouchDevice) return;
      isHoveringButton = false;
      hoverPrevText.style.opacity = '0';
      hoverPrevText.style.visibility = 'hidden';
      stopMusicSparkles();
    });
    
    nextBtn.addEventListener('mouseenter', () => {
      if (isTouchDevice) return;
      isHoveringButton = true;
      hoverNextText.style.opacity = '1';
      hoverNextText.style.visibility = 'visible';
      createMusicSparkles(nextBtn);
    });
    
    nextBtn.addEventListener('mouseleave', () => {
      if (isTouchDevice) return;
      isHoveringButton = false;
      hoverNextText.style.opacity = '0';
      hoverNextText.style.visibility = 'hidden';
      stopMusicSparkles();
    });
    
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        allScrollers.forEach(s => s.stop());
      } else {
        allScrollers.forEach(s => s.resume());
      }
    });
  });
</script>
